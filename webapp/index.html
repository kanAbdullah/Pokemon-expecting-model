<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon Legendary Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060e1f;
    --surface: #0b1a35;
    --surface2: #0f2244;
    --border: #1a3a6a;
    --teal: #00d4c8;
    --cyan: #00aaff;
    --blue: #1a6fff;
    --muted: #4a7aaa;
    --text: #c8e0ff;
    --text2: #7aaad0;
    --glow: rgba(0, 212, 200, 0.15);
    --glow2: rgba(0, 170, 255, 0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Exo 2', sans-serif;
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(0,100,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(0,212,200,0.06) 0%, transparent 60%);
  }

  header {
    padding: 1.5rem 2rem;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  header .logo-icon {
    width: 36px; height: 36px;
    border: 2px solid var(--teal);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 12px rgba(0,212,200,0.4);
    position: relative;
    flex-shrink: 0;
  }
  header .logo-icon::after {
    content: '';
    width: 8px; height: 8px;
    background: var(--teal);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--teal);
  }
  header h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text);
  }
  header h1 span { color: var(--teal); }

  .endpoint-bar {
    display: flex; align-items: center; gap: 8px;
    margin-left: auto;
  }
  .endpoint-bar label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .endpoint-bar input {
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-size: 12px;
    padding: 5px 10px;
    width: 200px;
  }
  .endpoint-bar input:focus { outline: none; border-color: var(--teal); }

  .main {
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 2rem;
  }

  .left-panel {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .image-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .image-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, var(--glow) 0%, transparent 70%);
    pointer-events: none;
  }
  .image-card img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
    filter: drop-shadow(0 0 20px rgba(0,212,200,0.3));
    display: none;
  }
  .image-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: var(--muted);
  }
  .pokeball-svg { opacity: 0.3; }
  .image-placeholder span { font-size: 13px; letter-spacing: 1px; }

  .result-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .result-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .result-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0.75rem 1rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    transition: all 0.4s ease;
  }
  .badge-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: all 0.4s ease;
  }
  .result-badge.legendary {
    border-color: var(--teal);
    background: rgba(0,212,200,0.08);
  }
  .result-badge.legendary .badge-dot {
    background: var(--teal);
    box-shadow: 0 0 8px var(--teal);
  }
  .result-badge.not-legendary {
    border-color: var(--cyan);
    background: rgba(0,170,255,0.08);
  }
  .result-badge.not-legendary .badge-dot {
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
  }
  .badge-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--text);
  }

  .prob-section { display: flex; flex-direction: column; gap: 6px; }
  .prob-header { display: flex; justify-content: space-between; align-items: baseline; }
  .prob-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .prob-value {
    font-family: 'Rajdhani', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--teal);
  }
  .prob-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .prob-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--teal));
    border-radius: 2px;
    width: 0%;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .right-panel {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
  }

  .stat-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s ease;
  }
  .stat-card:hover { border-color: var(--teal); }
  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--teal), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .stat-card:hover::after { opacity: 1; }

  .stat-name {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }

  .gauge-wrap { position: relative; width: 120px; height: 68px; }
  .gauge-wrap svg { overflow: visible; }

  .stat-value-display {
    font-family: 'Rajdhani', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .stat-slider {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    border-radius: 2px;
    background: var(--surface2);
    outline: none;
    cursor: pointer;
  }
  .stat-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--teal);
    cursor: pointer;
    box-shadow: 0 0 6px rgba(0,212,200,0.6);
    transition: box-shadow 0.2s;
  }
  .stat-slider:hover::-webkit-slider-thumb {
    box-shadow: 0 0 12px rgba(0,212,200,0.9);
  }

  .predict-btn {
    width: 100%;
    padding: 1rem;
    background: transparent;
    border: 1px solid var(--teal);
    border-radius: 12px;
    color: var(--teal);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
  }
  .predict-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--teal);
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    z-index: 0;
  }
  .predict-btn:hover::before { transform: translateX(0); }
  .predict-btn:hover { color: var(--bg); }
  .predict-btn span { position: relative; z-index: 1; }
  .predict-btn:active { transform: scale(0.98); }
  .predict-btn:disabled {
    opacity: 0.5; cursor: not-allowed;
    border-color: var(--muted); color: var(--muted);
  }
  .predict-btn:disabled::before { display: none; }

  .stats-summary {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
  }
  .summary-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .summary-key { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  .summary-val {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--cyan);
  }

  .error-msg {
    font-size: 12px;
    color: #ff6b6b;
    text-align: center;
    padding: 0.5rem;
    display: none;
  }

  @media (max-width: 700px) {
    .main { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .stats-summary { grid-template-columns: repeat(3, 1fr); }
    .endpoint-bar { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-icon"></div>
  <h1>Pokémon <span>Legendary</span> Predictor</h1>
  <div class="endpoint-bar">
    <label>API Endpoint</label>
    <input type="text" id="endpoint" value="https://pokemon-expecting-model-production.up.railway.app/predict" placeholder="https://...railway.app/predict">
  </div>
</header>

<div class="main">
  <div class="left-panel">
    <div class="image-card" id="imageCard">
      <div class="image-placeholder" id="imgPlaceholder">
        <svg class="pokeball-svg" width="72" height="72" viewBox="0 0 72 72">
          <circle cx="36" cy="36" r="34" stroke="#4a7aaa" stroke-width="2" fill="none"/>
          <path d="M2 36 Q2 2 36 2 Q70 2 70 36" fill="rgba(0,170,255,0.15)"/>
          <line x1="2" y1="36" x2="70" y2="36" stroke="#4a7aaa" stroke-width="2"/>
          <circle cx="36" cy="36" r="10" stroke="#4a7aaa" stroke-width="2" fill="var(--surface)"/>
          <circle cx="36" cy="36" r="5" fill="#4a7aaa"/>
        </svg>
        <span>Awaiting Prediction</span>
      </div>
      <img id="pokemonImg" alt="Pokémon">
    </div>

    <div class="result-card">
      <span class="result-label">Classification</span>
      <div class="result-badge" id="resultBadge">
        <div class="badge-dot"></div>
        <span class="badge-text" id="resultText">—</span>
      </div>

      <div class="prob-section">
        <div class="prob-header">
          <span class="prob-title">Confidence</span>
          <span class="prob-value" id="probValue">—</span>
        </div>
        <div class="prob-bar"><div class="prob-fill" id="probFill"></div></div>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="right-panel">
    <div class="stats-grid" id="statsGrid"></div>

    <div class="stats-summary" id="statsSummary"></div>

    <button class="predict-btn" id="predictBtn" onclick="predict()">
      <span>⬡ Analyze Pokémon</span>
    </button>
  </div>
</div>

<script>
const STATS = [
  { key: 'hp',          label: 'HP',         color: '#00d4c8', max: 150 },
  { key: 'attack',      label: 'ATK',        color: '#00aaff', max: 150 },
  { key: 'defense',     label: 'DEF',        color: '#1a6fff', max: 150 },
  { key: 'sp_attack',   label: 'SP.ATK',     color: '#00d4c8', max: 150 },
  { key: 'sp_defense',  label: 'SP.DEF',     color: '#00aaff', max: 150 },
  { key: 'speed',       label: 'SPD',        color: '#1a6fff', max: 150 },
];

const defaults = { hp: 120, attack: 150, defense: 120, sp_attack: 150, sp_defense: 120, speed: 130 };

function buildArc(pct, color) {
  const cx = 60, cy = 60, r = 52;
  const startAngle = 135, endAngle = 45;
  const totalDeg = 270;
  const fillDeg = Math.min(totalDeg * pct, totalDeg - 0.01);
  const toRad = d => (d - 90) * Math.PI / 180;
  function arc(startDeg, sweepDeg) {
    const s = toRad(startDeg), e = toRad(startDeg + sweepDeg);
    const laf = sweepDeg > 180 ? 1 : 0;
    return `M ${cx + r * Math.cos(s)} ${cy + r * Math.sin(s)} A ${r} ${r} 0 ${laf} 1 ${cx + r * Math.cos(e)} ${cy + r * Math.sin(e)}`;
  }
  const bgPath  = arc(startAngle, totalDeg);
  const fillPath = fillDeg > 1 ? arc(startAngle, fillDeg) : '';
  const nAngle = toRad(startAngle + fillDeg);
  const nx = cx + (r - 6) * Math.cos(nAngle);
  const ny = cy + (r - 6) * Math.sin(nAngle);

  return `
    <svg width="120" height="72" viewBox="12 18 96 56" xmlns="http://www.w3.org/2000/svg">
      <path d="${bgPath}" fill="none" stroke="#0f2244" stroke-width="6" stroke-linecap="round"/>
      ${fillPath ? `<path d="${fillPath}" fill="none" stroke="${color}" stroke-width="6" stroke-linecap="round" opacity="0.9"/>` : ''}
      ${fillPath ? `<circle cx="${nx}" cy="${ny}" r="4" fill="${color}" opacity="0.9"/>` : ''}
    </svg>`;
}

function buildStatCard(stat) {
  const val = defaults[stat.key];
  const pct = val / stat.max;
  return `
    <div class="stat-card">
      <span class="stat-name">${stat.label}</span>
      <div class="gauge-wrap" id="gauge_${stat.key}">${buildArc(pct, stat.color)}</div>
      <span class="stat-value-display" id="val_${stat.key}">${val}</span>
      <input type="range" class="stat-slider" min="0" max="${stat.max}" step="1"
        value="${val}" id="slider_${stat.key}"
        oninput="updateStat('${stat.key}', this.value, '${stat.color}', ${stat.max})">
    </div>`;
}

function buildSummaryItem(stat, val) {
  return `<div class="summary-item">
    <span class="summary-key">${stat.label}</span>
    <span class="summary-val" id="sum_${stat.key}">${val}</span>
  </div>`;
}

document.getElementById('statsGrid').innerHTML = STATS.map(buildStatCard).join('');
document.getElementById('statsSummary').innerHTML = STATS.map(s => buildSummaryItem(s, defaults[s.key])).join('');

function updateStat(key, val, color, max) {
  const v = parseInt(val);
  document.getElementById('val_' + key).textContent = v;
  document.getElementById('sum_' + key).textContent = v;
  document.getElementById('gauge_' + key).innerHTML = buildArc(v / max, color);
}

function getValues() {
  const out = {};
  STATS.forEach(s => { out[s.key] = parseInt(document.getElementById('slider_' + s.key).value); });
  return out;
}

async function predict() {
  const btn = document.getElementById('predictBtn');
  const errEl = document.getElementById('errorMsg');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.querySelector('span').textContent = '⟳ Analyzing…';

  const endpoint = document.getElementById('endpoint').value.trim();
  const body = getValues();

  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    const data = await res.json();
    displayResult(data);
  } catch (e) {
    errEl.textContent = '⚠ ' + e.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.querySelector('span').textContent = '⬡ Analyze Pokémon';
  }
}

function displayResult(data) {
  const isLegendary = data.prediction === 1;
  const prob = typeof data.probability === 'number' ? data.probability : 0;

  const badge  = document.getElementById('resultBadge');
  const text   = document.getElementById('resultText');
  const probEl = document.getElementById('probValue');
  const fill   = document.getElementById('probFill');

  badge.className = 'result-badge ' + (isLegendary ? 'legendary' : 'not-legendary');
  text.textContent = isLegendary ? 'Legendary' : 'Not Legendary';
  probEl.textContent = (prob * 100).toFixed(1) + '%';
  fill.style.width = (prob * 100).toFixed(1) + '%';

  const img = document.getElementById('pokemonImg');
  const placeholder = document.getElementById('imgPlaceholder');

  if (data.image && data.is_img_null !== '1') {
    try {
      img.src = data.image.startsWith('data:') ? data.image : 'data:image/png;base64,' + data.image;
      img.onload  = () => { img.style.display = 'block'; placeholder.style.display = 'none'; };
      img.onerror = () => { img.style.display = 'none'; placeholder.style.display = 'flex'; };
    } catch (_) {
      img.style.display = 'none';
      placeholder.style.display = 'flex';
    }
  } else {
    img.style.display = 'none';
    placeholder.style.display = 'flex';
    placeholder.querySelector('span').textContent = isLegendary ? 'Legendary Pokémon' : 'Normal Pokémon';
  }
}
</script>
</body>
</html>
